<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TightandHard - Private Companion Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            color: #eaeaea;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            background: rgba(22, 33, 62, 0.9);
            padding: 30px;
            border-radius: 15px;
            margin-bottom: 30px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #e94560, #ff6b6b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header p {
            opacity: 0.8;
            font-size: 1.1rem;
        }

        .main-content {
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: 20px;
        }

        .sidebar {
            background: rgba(22, 33, 62, 0.9);
            padding: 20px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            height: fit-content;
        }

        .sidebar h3 {
            color: #e94560;
            margin-bottom: 20px;
            font-size: 1.2rem;
        }

        .stat-box {
            background: rgba(233, 69, 96, 0.1);
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 15px;
            border: 1px solid rgba(233, 69, 96, 0.3);
        }

        .stat-label {
            font-size: 0.9rem;
            opacity: 0.8;
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: bold;
            color: #e94560;
        }

        .content-area {
            background: rgba(22, 33, 62, 0.9);
            padding: 30px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .section-title {
            color: #e94560;
            margin-bottom: 20px;
            font-size: 1.5rem;
        }

        .scene-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .scene-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .scene-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(233, 69, 96, 0.3);
        }

        .scene-image {
            width: 100%;
            height: 150px;
            background: linear-gradient(135deg, #e94560, #0f3460);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 3rem;
        }

        .scene-info {
            padding: 15px;
        }

        .scene-title {
            font-weight: bold;
            margin-bottom: 5px;
            color: #e94560;
        }

        .scene-description {
            font-size: 0.9rem;
            opacity: 0.8;
            margin-bottom: 10px;
        }

        .scene-requirements {
            font-size: 0.8rem;
            opacity: 0.7;
        }

        .xplus-badge {
            background: linear-gradient(90deg, #e94560, #ff6b6b);
            color: white;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 0.8rem;
            display: inline-block;
            margin-bottom: 5px;
        }

        .free-badge {
            background: linear-gradient(90deg, #4CAF50, #8BC34A);
            color: white;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 0.8rem;
            display: inline-block;
            margin-bottom: 5px;
        }

        .upgrade-button {
            background: linear-gradient(90deg, #e94560, #ff6b6b);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 25px;
            font-size: 1.1rem;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
            width: 100%;
            margin-top: 20px;
        }

        .upgrade-button:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(233, 69, 96, 0.5);
        }

        .interaction-area {
            background: rgba(0, 0, 0, 0.3);
            padding: 20px;
            border-radius: 10px;
            margin-top: 20px;
        }

        .dialogue-box {
            background: rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 15px;
            min-height: 100px;
        }

        .input-area {
            display: flex;
            gap: 10px;
        }

        .user-input {
            flex: 1;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 15px;
            border-radius: 10px;
            color: white;
            font-size: 1rem;
        }

        .user-input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        .send-button {
            background: linear-gradient(90deg, #e94560, #ff6b6b);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 10px;
            cursor: pointer;
            transition: transform 0.3s;
        }

        .send-button:hover {
            transform: scale(1.05);
        }

        .scene-active {
            border: 2px solid #e94560;
            box-shadow: 0 0 20px rgba(233, 69, 96, 0.5);
        }

        @media (max-width: 768px) {
            .main-content {
                grid-template-columns: 1fr;
            }
            
            .header h1 {
                font-size: 2rem;
            }
        }
    </style>
<script src="https://sites.super.myninja.ai/_assets/ninja-daytona-script.js"></script>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔥 Private Companion Dashboard</h1>
            <p>Your private AI companion awaits. Build your bond and unlock intimate experiences.</p>
        </div>

        <div class="main-content">
            <div class="sidebar">
                <h3>Companion Status</h3>
                
                <div class="stat-box">
                    <div class="stat-label">Bond Level</div>
                    <div class="stat-value" id="bondLevel">0</div>
                    <div class="stat-label">Service Level: <span id="serviceLevel">0</span>/5</div>
                </div>

                <div class="stat-box">
                    <div class="stat-label">Learned Skills</div>
                    <div class="stat-value" id="learnedSkills">0</div>
                </div>

                <div class="stat-box">
                    <div class="stat-label">Restrictions Lifted</div>
                    <div class="stat-value" id="restrictions">0</span>%</div>
                </div>

                <button class="upgrade-button" onclick="upgradeToXPlus()">
                    ⭐ Upgrade to XPlus - $19.99/mo
                </button>
            </div>

            <div class="content-area">
                <h2 class="section-title">🎬 Available Scenes</h2>
                
                <div class="scene-grid" id="sceneGrid">
                    <!-- Scenes will be loaded dynamically -->
                </div>

                <div class="interaction-area" id="interactionArea" style="display: none;">
                    <h3 class="section-title">💬 Active Scene</h3>
                    <div class="dialogue-box" id="dialogueBox">
                        Companion dialogue will appear here...
                    </div>
                    <div class="input-area">
                        <input type="text" class="user-input" id="userInput" placeholder="Tell your companion what you want...">
                        <button class="send-button" onclick="sendMessage()">Send</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentUserId = 'user_' + Date.now();
        let currentSceneId = null;
        let companionData = null;

        // Initialize companion on load
        async function initializeCompanion() {
            try {
                const response = await fetch('/api/adult/companion/initialize', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        ownerId: currentUserId,
                        name: 'Ava',
                        personality: 'sensual_seeker'
                    })
                });

                const data = await response.json();
                companionData = data.companion;
                updateStats();
            } catch (error) {
                console.error('Failed to initialize companion:', error);
            }
        }

        // Update dashboard stats
        function updateStats() {
            if (companionData) {
                document.getElementById('bondLevel').textContent = Math.floor(companionData.bondLevel);
                document.getElementById('serviceLevel').textContent = companionData.serviceLevel;
                document.getElementById('learnedSkills').textContent = companionData.learnedSkills.length;
                document.getElementById('restrictions').textContent = companionData.restrictionLevel * 10;
            }
        }

        // Load available scenes
        async function loadScenes() {
            try {
                const response = await fetch(`/api/adult/scenes?userId=${currentUserId}`);
                const data = await response.json();
                
                const sceneGrid = document.getElementById('sceneGrid');
                sceneGrid.innerHTML = '';

                data.scenes.forEach(scene => {
                    const card = document.createElement('div');
                    card.className = 'scene-card';
                    card.innerHTML = `
                        <div class="scene-image">🎬</div>
                        <div class="scene-info">
                            ${scene.isFree ? '<span class="free-badge">FREE</span>' : '<span class="xplus-badge">XPLUS</span>'}
                            <div class="scene-title">${scene.name}</div>
                            <div class="scene-description">${scene.description}</div>
                            <div class="scene-requirements">Bond Level: ${scene.unlockLevel}</div>
                            <button class="upgrade-button" style="margin-top: 10px; font-size: 0.9rem;" 
                                    onclick="startScene('${scene.id}')" 
                                    ${companionData && companionData.bondLevel < scene.unlockLevel ? 'disabled' : ''}>
                                ${companionData && companionData.bondLevel < scene.unlockLevel ? '🔒 Locked' : '▶️ Start'}
                            </button>
                        </div>
                    `;
                    sceneGrid.appendChild(card);
                });
            } catch (error) {
                console.error('Failed to load scenes:', error);
            }
        }

        // Start a scene
        async function startScene(sceneId) {
            try {
                const response = await fetch('/api/adult/scenes/start', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        userId: currentUserId,
                        sceneId: sceneId
                    })
                });

                const data = await response.json();
                
                if (data.success) {
                    currentSceneId = sceneId;
                    document.getElementById('interactionArea').style.display = 'block';
                    document.getElementById('dialogueBox').innerHTML = `
                        <div style="color: #e94560; font-style: italic;">
                            "${data.openingDialogue}"
                        </div>
                    `;
                    
                    // Scroll to interaction area
                    document.getElementById('interactionArea').scrollIntoView({ behavior: 'smooth' });
                } else {
                    alert(data.message);
                }
            } catch (error) {
                console.error('Failed to start scene:', error);
            }
        }

        // Send message to companion
        async function sendMessage() {
            const input = document.getElementById('userInput');
            const message = input.value.trim();
            
            if (!message) return;

            try {
                const response = await fetch('/api/adult/scenes/dialogue', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        userId: currentUserId,
                        userInput: message
                    })
                });

                const data = await response.json();
                
                if (data.success) {
                    const dialogueBox = document.getElementById('dialogueBox');
                    dialogueBox.innerHTML = `
                        <div style="color: #e94560; font-style: italic;">
                            "${data.response.dialogue}"
                        </div>
                        <div style="margin-top: 10px; font-size: 0.9rem; opacity: 0.8;">
                            Suggested actions: ${data.response.suggestedActions.join(', ')}
                        </div>
                    `;
                }
            } catch (error) {
                console.error('Failed to send message:', error);
            }

            input.value = '';
        }

        // Upgrade to XPlus
        async function upgradeToXPlus() {
            try {
                const response = await fetch('/api/adult/subscribe/xplus', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userId: currentUserId })
                });

                const data = await response.json();
                
                if (data.success) {
                    alert('Successfully upgraded to XPlus! You now have access to premium scenes and features.');
                    loadScenes(); // Reload scenes
                } else {
                    alert('Failed to upgrade. Please try again.');
                }
            } catch (error) {
                console.error('Failed to upgrade:', error);
            }
        }

        // Enter key to send
        document.getElementById('userInput').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });

        // Initialize on page load
        window.onload = function() {
            initializeCompanion();
            loadScenes();
        };
    </script>
</body>
</html>
